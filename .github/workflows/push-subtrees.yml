name: Push Subtrees

on:
  push:
    branches:
      - main

jobs:
  push-subtrees:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - prefix: src/Common
            repo: Azure-OSS/azure-storage-common
            secret: DEPLOY_KEY_COMMON
          - prefix: src/Blob
            repo: Azure-OSS/azure-storage-php
            secret: DEPLOY_KEY_BLOB
          - prefix: src/BlobFlysystem
            repo: Azure-OSS/azure-storage-php-adapter-flysystem
            secret: DEPLOY_KEY_BLOB_FLYSYSTEM
          - prefix: src/BlobLaravel
            repo: Azure-OSS/azure-storage-php-adapter-laravel
            secret: DEPLOY_KEY_BLOB_LARAVEL
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Cache splitsh-lite
        id: cache-splitsh
        uses: actions/cache@v3
        with:
          path: /usr/local/bin/splitsh-lite
          key: splitsh-lite-v1.0.1

      - name: Install splitsh-lite
        if: steps.cache-splitsh.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz
          tar -zxf lite_linux_amd64.tar.gz
          chmod +x splitsh-lite
          sudo mv splitsh-lite /usr/local/bin/

      - name: Setup SSH and push
        env:
          SSH_KEY: ${{ secrets[matrix.secret] }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          git config --global user.name "github-actions"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          SHA=$(splitsh-lite --prefix=${{ matrix.prefix }})
          git push git@github.com:${{ matrix.repo }}.git $SHA:refs/heads/main --force
